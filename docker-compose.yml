services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: financetracker-db
    environment:
      POSTGRES_DB: financetracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"   # 5433 on host so it doesn't clash with your local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data  # data persists across container restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot app
  app:
    build: .
    container_name: financetracker-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/financetracker
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
    depends_on:
      db:
        condition: service_healthy   # waits for PostgreSQL to be ready before starting app

volumes:
  postgres_data:
